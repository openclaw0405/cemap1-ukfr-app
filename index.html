<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CeMAP 1 UKFR Memory Revision Lab</title>
  <meta name="description" content="Standalone CeMAP 1 UKFR revision app with a 30-day memory-optimised plan, framework-first notes, grounded question bank, wrong-answer retry and mock mode." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-inner">
        <div class="kicker">CeMAP 1 · UKFR</div>
        <h1>Memory Revision Lab</h1>
        <p>A 30-day structured study plan with framework-first notes, MCQ drills, weak-area retry, and mock exams.</p>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
    </header>

    <div class="layout">
      <aside class="panel sidebar">
        <div class="sidebar-head">
          <h2>30-day plan</h2>
          <div class="sidebar-chips">
            <span class="chip" id="overallDone">0 / 30</span>
            <span class="chip muted" id="questionCount">0 Qs</span>
          </div>
        </div>
        <div class="sidebar-scroll" id="dayList"></div>
      </aside>

      <main class="main">
        <section class="panel toolbar-panel">
          <div class="toolbar" id="topToolbar">
            <button class="tabbtn on" data-tab="dashboard">
              <span class="tab-icon">◈</span>Dashboard
            </button>
            <button class="tabbtn alt" data-tab="daily">
              <span class="tab-icon">◉</span>Daily study
            </button>
            <button class="tabbtn alt" data-tab="topics">
              <span class="tab-icon">◎</span>Topics
            </button>
            <button class="tabbtn alt" data-tab="weak">
              <span class="tab-icon">↺</span>Weak areas
            </button>
            <button class="tabbtn alt" data-tab="mock">
              <span class="tab-icon">⏱</span>Mock
            </button>
          </div>
        </section>

        <section class="panel content section on" id="dashboard"></section>
        <section class="panel content section" id="daily"></section>
        <section class="panel content section" id="topics"></section>
        <section class="panel content section" id="weak"></section>
        <section class="panel content section" id="mock"></section>
      </main>
    </div>

    <!-- Mobile bottom navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="bnav-item active" data-tab="dashboard">
        <span class="bnav-icon">◈</span>
        <span class="bnav-label">Dashboard</span>
      </button>
      <button class="bnav-item" data-tab="daily">
        <span class="bnav-icon">◉</span>
        <span class="bnav-label">Daily</span>
      </button>
      <button class="bnav-item" data-tab="topics">
        <span class="bnav-icon">◎</span>
        <span class="bnav-label">Topics</span>
      </button>
      <button class="bnav-item" data-tab="weak">
        <span class="bnav-icon">↺</span>
        <span class="bnav-label">Weak</span>
      </button>
      <button class="bnav-item" data-tab="mock">
        <span class="bnav-icon">⏱</span>
        <span class="bnav-label">Mock</span>
      </button>
    </nav>

    <div class="footer">Rewritten revision content, grounded question bank, static files only.</div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
